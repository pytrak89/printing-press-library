version: 2
project_name: booking-com-pp-cli
changelog:
  disable: true
builds:
  - id: booking-com-pp-cli
    main: ./cmd/booking-com-pp-cli
    binary: booking-com-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/booking-com/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: booking-com-pp-mcp
    main: ./cmd/booking-com-pp-mcp
    binary: booking-com-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: booking-com-pp-cli
    repository:
      owner: mvanhorn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Booking.com workflow, plus offline price history, wishlist drop alerts, and multi-leg planning no other..."
    install: |
      bin.install "booking-com-pp-cli"
      bin.install "booking-com-pp-mcp"
