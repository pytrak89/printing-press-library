version: 2
project_name: loopnet-pp-cli
changelog:
  disable: true
builds:
  - id: loopnet-pp-cli
    main: ./cmd/loopnet-pp-cli
    binary: loopnet-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/loopnet/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: loopnet-pp-mcp
    main: ./cmd/loopnet-pp-mcp
    binary: loopnet-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: loopnet-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "LoopNet shows you today — this CLI remembers, building the price-cut, days-on-market, and supply trends LoopNet..."
    install: |
      bin.install "loopnet-pp-cli"
      bin.install "loopnet-pp-mcp"
