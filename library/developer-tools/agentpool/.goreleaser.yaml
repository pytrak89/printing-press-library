version: 2
project_name: agentpool-pp-cli
changelog:
  disable: true
builds:
  - id: agentpool-pp-cli
    main: ./cmd/agentpool-pp-cli
    binary: agentpool-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/agentpool/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: agentpool-pp-cli
    repository:
      owner: sidduHERE
      name: homebrew-tap
    homepage: "https://github.com/sidduHERE/agentpool"
    description: "Printing Press companion for the official AgentPool CLI. Checks setup, teaches workflows, and delegates to the real agentpool binary."
    install: |
      bin.install "agentpool-pp-cli"
